version: 2

seeds:
  - name: TBL_EMPLOYEE
    config:
      column_types:
        EMPLOYEE_ID: varchar
        EMPLOYEE_NAME: varchar
        JOB_TITLE: varchar
        START_DATE: date
        EMAIL: varchar
        PHONE: varchar
        DEPARTMENT_ID: varchar
        LOAD_TIME: timestamp

  - name: TBL_DEPARTMENT
    config:
      column_types:
        DEPARTMENT_ID: varchar
        DEPARTMENT_NAME: varchar
        MANAGER_NAME: varchar
        LOCATION: varchar
        LOAD_TIME: timestamp

  - name: TBL_PAYROLL
    config:
      column_types:
        EMPLOYEE_ID: varchar
        PAY_CYCLE: varchar
        BASE_SALARY: decimal(18,2)
        BONUS: decimal(18,2)
        COUNTRY_CURRENCY: varchar
        LOAD_TIME: timestamp

  - name: TBL_PROJECT
    config:
      column_types:
        PROJECT_ID: varchar
        PROJECT_NAME: varchar
        PROJECT_CATEGORY: varchar
        START_DATE: date
        END_DATE: date
        OWNER_EMPLOYEE_ID: varchar
        LOAD_TIME: timestamp

  - name: TBL_ASSIGNMENT
    config:
      column_types:
        ASSIGNMENT_ID: varchar
        EMPLOYEE_ID: varchar
        PROJECT_ID: varchar
        ROLE_ON_PROJECT: varchar
        ALLOCATION_PCT: decimal(10,2)
        EFFECTIVE_FROM: date
        LOAD_TIME: timestamp

  - name: TBL_TIMESHEET
    config:
      column_types:
        TIMESHEET_ID: varchar
        EMPLOYEE_ID: varchar
        PROJECT_ID: varchar
        WORK_DATE: date
        HOURS_WORKED: decimal(10,2)
        BILLABLE_FLAG: varchar
        LOAD_TIME: timestamp
